services: 
  db: 
    container_name: tsr_postgres
    image: postgres:18.3
    restart: always
    environment: 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
    ports: 
      - '5433:5432'
    volumes: 
      - postgres_data:/var/lib/postgresql

volumes: 
  postgres_data: 